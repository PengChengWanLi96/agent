<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 管理控制台</title>
    <link rel="stylesheet" href="/xterm.min.css">
    <script src="/xterm.min.js"></script>
    <script src="/xterm-addon-fit.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f7fa;
            color: #333;
        }
        .page {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px 24px 24px;
        }
        h1 {
            margin: 0 0 16px;
            font-size: 22px;
            color: #1a1a1a;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: background .2s;
        }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #93c5fd; cursor: not-allowed; }
        button.secondary { background: #e2e8f0; color: #334155; }
        button.secondary:hover { background: #cbd5e1; }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
            padding: 16px 20px;
            overflow: hidden;
        }
        .card.flex {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .card h2 {
            margin: 0 0 12px;
            font-size: 16px;
            color: #444;
        }
        .result-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .result-card #result {
            flex: 1;
            overflow: auto;
        }
        .form-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .form-row label { font-size: 14px; color: #475569; font-weight: 500; }
        .form-row input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }
        .drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 32px 24px;
            text-align: center;
            color: #64748b;
            position: relative;
            transition: border-color .2s, background .2s;
            cursor: pointer;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #2563eb;
            background: #eff6ff;
            color: #2563eb;
        }
        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .drop-zone-prompt svg { margin-bottom: 8px; color: #94a3b8; }
        .drop-zone:hover .drop-zone-prompt svg,
        .drop-zone.dragover .drop-zone-prompt svg { color: #2563eb; }
        .drop-zone-prompt p { margin: 4px 0; font-size: 14px; }
        .drop-zone-prompt .link { color: #2563eb; text-decoration: underline; }
        .drop-zone-prompt .hint { font-size: 12px; color: #94a3b8; }
        .file-list {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #f8fafc;
            border-radius: 6px;
            font-size: 13px;
        }
        .file-item .name { color: #334155; word-break: break-all; }
        .file-item .size { color: #64748b; white-space: nowrap; margin-left: 12px; }
        .file-item .remove {
            margin-left: 12px;
            color: #ef4444;
            cursor: pointer;
            font-size: 12px;
        }
        .upload-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .upload-result {
            margin-top: 16px;
            font-size: 13px;
        }
        .upload-result .success { color: #16a34a; }
        .upload-result .fail { color: #ef4444; }
        .progress-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: #2563eb;
            transition: width .2s;
        }
        pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 6px;
            overflow: auto;
            font-size: 13px;
            line-height: 1.5;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .error { color: #ef4444; }
        .placeholder { color: #94a3b8; }
        .table-wrap {
            overflow-x: auto;
            background: #fff;
            border-radius: 6px;
        }
        table {
            width: 100%;
            min-width: 900px;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: top;
        }
        th {
            background: #f8fafc;
            color: #64748b;
            font-weight: 600;
            white-space: nowrap;
        }
        td {
            color: #334155;
            word-break: break-word;
        }
        td.nowrap { white-space: nowrap; }
        td.id { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .status-running { color: #16a34a; font-weight: 500; }
        .status-exited { color: #dc2626; }
        .status-paused { color: #ca8a04; }
        .status-restarting { color: #2563eb; }
        h3 { margin: 16px 0 10px; font-size: 15px; color: #444; }
        .ssh-panel {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: #f5f7fa;
            padding: 16px 24px 24px;
        }
        .ssh-panel.active {
            display: flex;
            flex-direction: column;
        }
        .ssh-panel > h2 {
            flex-shrink: 0;
            margin: 0 0 12px;
            font-size: 16px;
            color: #444;
        }
        .ssh-workspace {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        .ssh-file-manager, .ssh-terminal {
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            min-width: 0;
            max-height: 100%;
        }
        .ssh-file-manager {
            width: 20%;
            flex-shrink: 0;
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
            border-right: none;
        }
        .ssh-terminal {
            flex: 1;
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }
        .ssh-splitter {
            width: 8px;
            cursor: col-resize;
            background: #e2e8f0;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        .ssh-splitter:hover { background: #cbd5e1; }
        .ssh-splitter.dragging { background: #94a3b8; }
        .ssh-section-header {
            padding: 10px 14px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .ssh-breadcrumb {
            padding: 8px 12px;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            font-size: 13px;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .ssh-breadcrumb span { cursor: pointer; color: #2563eb; }
        .ssh-breadcrumb span:hover { text-decoration: underline; }
        .ssh-path-input {
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-bottom: 1px solid #e2e8f0;
            font-size: 13px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            color: #475569;
            background: #fff;
            flex-shrink: 0;
        }
        .ssh-path-input:focus {
            outline: none;
            background: #f8fafc;
        }
        .ssh-file-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .ssh-file-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            gap: 10px;
        }
        .ssh-file-item:hover { background: #f1f5f9; }
        .ssh-file-item.selected { background: #dbeafe; }
        .ssh-file-item .icon { width: 18px; text-align: center; }
        .ssh-file-item .name { flex: 1; word-break: break-all; }
        .ssh-file-item .size { color: #64748b; white-space: nowrap; min-width: 70px; text-align: right; }
        .ssh-file-item .actions { display: none; gap: 8px; }
        .ssh-file-item:hover .actions { display: flex; }
        .ssh-file-item .actions span {
            color: #2563eb;
            font-size: 12px;
            cursor: pointer;
        }
        .ssh-file-item .actions span.danger { color: #ef4444; }
        .ssh-file-toolbar {
            padding: 8px 12px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .ssh-file-toolbar button {
            padding: 5px 10px;
            font-size: 12px;
        }
        .ssh-terminal-container {
            flex: 1;
            background: #0f172a;
            padding: 0;
            overflow: hidden;
            position: relative;
            display: flex;
        }
        .ssh-terminal-container .terminal {
            flex: 1;
            min-height: 0;
        }
        .ssh-form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .ssh-form-row input, .ssh-form-row textarea {
            flex: 1;
            min-width: 180px;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }
        .ssh-form-row textarea {
            min-height: 120px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            resize: vertical;
        }
        .ssh-status {
            font-size: 13px;
            color: #64748b;
            margin-top: 8px;
        }
        .ssh-status.connected { color: #16a34a; }
        .ssh-status.error { color: #ef4444; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 24px;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 8px;
            max-width: 420px;
            width: 100%;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,.15);
        }
        .modal-box h3 { margin: 0 0 16px; }
        .modal-box input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="page">
    <div class="container">
        <h1>Agent 管理控制台</h1>
        <div class="toolbar">
            <button id="btn-version" onclick="switchView('version')">查看版本信息</button>
            <button id="btn-metrics" onclick="switchView('metrics')">查看服务器监控指标</button>
            <button id="btn-containers" onclick="switchView('containers')">容器列表</button>
            <button id="btn-images" onclick="switchView('images')">镜像列表</button>
            <button id="btn-upload" onclick="switchView('upload')">文件上传</button>
            <button id="btn-ssh" onclick="switchView('ssh')">SSH 文件管理</button>
        </div>

        <div class="card upload-card" id="upload-card" style="display:none;">
            <h2>文件上传</h2>
            <div class="form-row">
                <label for="upload-dest">目标目录</label>
                <input type="text" id="upload-dest" placeholder="例如 /tmp/uploads 或 ./uploads" value="./uploads">
            </div>
            <div class="drop-zone" id="drop-zone">
                <div class="drop-zone-prompt">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <p>拖拽文件到此处，或 <span class="link">点击选择文件</span></p>
                    <p class="hint">支持多文件上传</p>
                </div>
                <input type="file" id="file-input" multiple>
            </div>
            <div class="file-list" id="file-list"></div>
            <div class="upload-actions">
                <button id="btn-submit-upload" onclick="submitUpload()" disabled>开始上传</button>
                <button class="secondary" onclick="clearUpload()">清空</button>
            </div>
            <div class="upload-result" id="upload-result"></div>
        </div>

        <div class="card ssh-panel flex" id="ssh-card">
            <h2>SSH 文件管理</h2>
            <div id="ssh-connect-form">
                <div class="ssh-form-row">
                    <button id="btn-ssh-local" onclick="connectLocalSSH()" style="flex:0 0 auto;">连接本机</button>
                    <span style="color:#64748b; font-size:13px; align-self:center;">或填写下方信息连接其他服务器</span>
                </div>
                <div class="ssh-form-row">
                    <input type="text" id="ssh-host" placeholder="主机地址" value="localhost">
                    <input type="number" id="ssh-port" placeholder="端口" value="22">
                    <input type="text" id="ssh-user" placeholder="用户名">
                </div>
                <div class="ssh-form-row">
                    <input type="password" id="ssh-password" placeholder="密码">
                </div>
                <div class="ssh-form-row">
                    <textarea id="ssh-private-key" placeholder="私钥内容（可选，与密码二选一）"></textarea>
                </div>
                <div class="upload-actions">
                    <button id="btn-ssh-connect" onclick="connectSSH()">连接</button>
                    <button class="secondary" onclick="hideSSHPanel()">取消</button>
                </div>
                <div class="ssh-status" id="ssh-status"></div>
            </div>

            <div id="ssh-workspace" style="display:none; margin-top: 12px; flex:1; min-height:0; flex-direction:column; overflow:hidden;">
                <div class="ssh-workspace">
                    <div class="ssh-file-manager" id="ssh-file-manager">
                        <div class="ssh-section-header">
                            <span>SFTP 文件管理</span>
                            <span id="ssh-session-info" style="font-weight: normal; color: #64748b; font-size: 12px;"></span>
                        </div>
                        <input type="text" class="ssh-path-input" id="ssh-path-input" value="/" onkeydown="handleSSHPathKey(event)">
                        <div class="ssh-file-toolbar">
                            <button onclick="sshGoUp()">返回上级</button>
                            <button onclick="showMkdirModal()">新建目录</button>
                            <button onclick="showRenameModal()">重命名</button>
                            <button onclick="triggerSSHUpload()">上传文件</button>
                            <input type="file" id="ssh-upload-input" style="display:none" onchange="handleSSHUpload(this)">
                        </div>
                        <div class="ssh-file-list" id="ssh-file-list"></div>
                    </div>
                    <div class="ssh-splitter" id="ssh-splitter"></div>
                    <div class="ssh-terminal" id="ssh-terminal">
                        <div class="ssh-section-header">命令行终端</div>
                        <div class="ssh-terminal-container" id="ssh-terminal-container"></div>
                    </div>
                </div>
                <div class="upload-actions" style="margin-top: 12px;">
                    <button class="secondary" onclick="disconnectSSH()">断开连接</button>
                </div>
            </div>
        </div>

        <div class="card result-card" id="result-card">
            <h2>结果</h2>
            <div id="result">
                <p class="placeholder">点击上方按钮查看对应信息。</p>
            </div>
        </div>
    </div>
    </div>

    <div class="modal-overlay" id="ssh-modal">
        <div class="modal-box">
            <h3 id="ssh-modal-title">提示</h3>
            <input type="text" id="ssh-modal-input" placeholder="">
            <div class="modal-actions">
                <button onclick="closeSSHModal()">取消</button>
                <button onclick="confirmSSHModal()">确定</button>
            </div>
        </div>
    </div>

    <script>
        const resultEl = document.getElementById('result');

        function setLoading(text) {
            resultEl.innerHTML = `<p class="placeholder">${text}</p>`;
        }

        function showError(err) {
            resultEl.innerHTML = `<p class="error">请求失败：${escapeHtml(err)}</p>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function getJson(url) {
            const res = await fetch(url);
            const body = await res.json();
            if (!res.ok || body.code !== 0) {
                throw new Error(body.message || `HTTP ${res.status}`);
            }
            return body.data;
        }

        function renderTable(rows, options = {}) {
            if (!rows.length) return '<p class="placeholder">无数据</p>';
            const headers = Object.keys(rows[0]);
            const headerClasses = options.headerClasses || {};
            const cellClasses = options.cellClasses || {};
            let html = '<div class="table-wrap"><table><tr>';
            html += headers.map(h => `<th class="${headerClasses[h] || ''}">${escapeHtml(h)}</th>`).join('');
            html += '</tr>';
            for (const row of rows) {
                html += '<tr>' + headers.map(h => {
                    const cls = cellClasses[h] || '';
                    return `<td class="${cls}">${escapeHtml(String(row[h] ?? ''))}</td>`;
                }).join('') + '</tr>';
            }
            html += '</table></div>';
            return html;
        }

        async function loadVersion() {
            setLoading('正在加载版本信息...');
            try {
                const data = await getJson('/api/v1/version');
                resultEl.innerHTML = `<pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
            } catch (err) {
                showError(err.message);
            }
        }

        async function loadMetrics() {
            setLoading('正在加载监控指标...');
            try {
                const data = await getJson('/api/v1/metrics/collect');
                let html = '';

                html += '<h3>CPU</h3>' + renderTable([data.cpu || {}]);
                html += '<h3>Memory</h3>' + renderTable([data.memory || {}]);
                html += '<h3>Load</h3>' + renderTable([data.load || {}]);
                html += '<h3>Disk</h3>' + renderTable(data.disk || []);
                html += '<h3>Network</h3>' + renderTable(data.network || []);
                html += `<p><strong>Uptime:</strong> ${escapeHtml(data.uptime_formatted ?? '-')} (${(data.uptime_seconds ?? 0).toFixed(3)} seconds)</p>`;

                resultEl.innerHTML = html;
            } catch (err) {
                showError(err.message);
            }
        }

        function formatBytes(bytes) {
            if (bytes == null || bytes === 0) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            const k = 1024;
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + units[i];
        }

        function formatContainerNames(names) {
            if (!Array.isArray(names) || !names.length) return '-';
            return names.map(n => n.replace(/^\//, '')).join(', ');
        }

        function formatPorts(ports) {
            if (!Array.isArray(ports) || !ports.length) return '-';
            return ports.map(p => {
                if (p.public_port) {
                    return `${p.ip || '0.0.0.0'}:${p.public_port} -> ${p.private_port}/${p.type}`;
                }
                return `${p.private_port}/${p.type}`;
            }).join(', ');
        }

        async function loadContainers() {
            setLoading('正在加载容器列表...');
            try {
                const data = await getJson('/api/v1/docker/containers?all=true');
                const rows = (data || []).map(c => ({
                    ID: c.id ? c.id.substring(0, 12) : '-',
                    Names: formatContainerNames(c.names),
                    Image: c.image || '-',
                    State: c.state || '-',
                    Status: c.status || '-',
                    Ports: formatPorts(c.ports),
                    Created: c.created ? new Date(c.created * 1000).toLocaleString() : '-'
                }));
                const cellClasses = {
                    ID: 'id nowrap',
                    State: 'nowrap',
                    Status: 'nowrap',
                    Created: 'nowrap'
                };
                resultEl.innerHTML = `<h3>容器列表（共 ${rows.length} 个）</h3>` + renderTable(rows, { cellClasses });
            } catch (err) {
                showError(err.message);
            }
        }

        async function loadImages() {
            setLoading('正在加载镜像列表...');
            try {
                const data = await getJson('/api/v1/docker/images');
                const rows = (data || []).map(img => ({
                    ID: img.id ? img.id.substring(0, 12) : '-',
                    Repository: (img.repo_tags && img.repo_tags.length) ? img.repo_tags.join(', ') : '<none>',
                    Size: formatBytes(img.size),
                    'Virtual Size': formatBytes(img.virtual_size),
                    Created: img.created ? new Date(img.created * 1000).toLocaleString() : '-'
                }));
                resultEl.innerHTML = `<h3>镜像列表（共 ${rows.length} 个）</h3>` + renderTable(rows);
            } catch (err) {
                showError(err.message);
            }
        }

        let pendingFiles = [];

        function switchView(view) {
            hideUploadPanel();
            hideSSHPanel();
            clearResult();
            if (view === 'version') loadVersion();
            else if (view === 'metrics') loadMetrics();
            else if (view === 'containers') loadContainers();
            else if (view === 'images') loadImages();
            else if (view === 'upload') showUploadPanel();
            else if (view === 'ssh') showSSHPanel();
        }

        function clearResult() {
            resultEl.innerHTML = '<p class="placeholder">点击上方按钮查看对应信息。</p>';
        }

        function showUploadPanel() {
            document.getElementById('upload-card').style.display = 'block';
        }

        function hideUploadPanel() {
            document.getElementById('upload-card').style.display = 'none';
        }

        function updateFileList() {
            const listEl = document.getElementById('file-list');
            if (!pendingFiles.length) {
                listEl.innerHTML = '';
                document.getElementById('btn-submit-upload').disabled = true;
                return;
            }
            listEl.innerHTML = pendingFiles.map((file, idx) => `
                <div class="file-item">
                    <span class="name">${escapeHtml(file.name)}</span>
                    <span>
                        <span class="size">${formatBytes(file.size)}</span>
                        <span class="remove" onclick="removeFile(${idx})">移除</span>
                    </span>
                </div>
            `).join('');
            document.getElementById('btn-submit-upload').disabled = false;
        }

        function removeFile(idx) {
            pendingFiles.splice(idx, 1);
            updateFileList();
        }

        function clearUpload() {
            pendingFiles = [];
            updateFileList();
            document.getElementById('upload-result').innerHTML = '';
            document.getElementById('file-input').value = '';
        }

        function handleFiles(files) {
            for (const file of files) {
                pendingFiles.push(file);
            }
            updateFileList();
        }

        async function submitUpload() {
            const destDir = document.getElementById('upload-dest').value.trim();
            if (!destDir) {
                alert('请填写目标目录');
                return;
            }
            if (!pendingFiles.length) {
                alert('请先选择文件');
                return;
            }

            const resultEl = document.getElementById('upload-result');
            resultEl.innerHTML = '<p class="placeholder">正在上传...</p>';
            document.getElementById('btn-submit-upload').disabled = true;

            const formData = new FormData();
            formData.append('dest_dir', destDir);
            for (const file of pendingFiles) {
                formData.append('files', file);
            }

            try {
                const res = await fetch('/api/v1/upload/files', { method: 'POST', body: formData });
                const body = await res.json();
                if (!res.ok || body.code !== 0) {
                    throw new Error(body.message || `HTTP ${res.status}`);
                }
                const results = body.data || [];
                const successCount = results.filter(r => r.success).length;
                const failCount = results.length - successCount;

                let html = `<p><strong>上传完成：</strong>成功 ${successCount} 个，失败 ${failCount} 个</p>`;
                html += '<ul>' + results.map(r => {
                    const cls = r.success ? 'success' : 'fail';
                    const msg = r.success ? formatBytes(r.size) : r.error;
                    return `<li class="${cls}">${escapeHtml(r.name)}：${escapeHtml(String(msg))}</li>`;
                }).join('') + '</ul>';
                resultEl.innerHTML = html;

                if (successCount === results.length) {
                    pendingFiles = [];
                    updateFileList();
                }
            } catch (err) {
                resultEl.innerHTML = `<p class="error">上传失败：${escapeHtml(err.message)}</p>`;
            } finally {
                document.getElementById('btn-submit-upload').disabled = pendingFiles.length === 0;
            }
        }

        (function initUpload() {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
            });
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
            });
            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
            });
            dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files), false);
            fileInput.addEventListener('change', e => handleFiles(e.target.files), false);
        })();

        // ===== SSH File Management =====
        let sshSession = null;
        let sshCurrentPath = '/';
        let sshSelectedFile = null;
        let sshModalCallback = null;
        let sshTerm = null;
        let sshTerminalWS = null;

        function initSplitter() {
            const splitter = document.getElementById('ssh-splitter');
            const fileManager = document.getElementById('ssh-file-manager');
            const workspace = document.querySelector('.ssh-workspace');
            let isDragging = false;

            splitter.addEventListener('mousedown', (e) => {
                isDragging = true;
                splitter.classList.add('dragging');
                document.body.style.userSelect = 'none';
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const rect = workspace.getBoundingClientRect();
                let pct = ((e.clientX - rect.left) / rect.width) * 100;
                pct = Math.max(10, Math.min(80, pct));
                fileManager.style.width = pct + '%';
                if (sshTerm) {
                    sshTerm.fit();
                    const dims = sshTerm.proposeGeometry();
                    if (dims && sshTerminalWS && sshTerminalWS.readyState === WebSocket.OPEN) {
                        sshTerminalWS.send(JSON.stringify({ type: 'resize', rows: dims.rows, cols: dims.cols }));
                    }
                }
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    splitter.classList.remove('dragging');
                    document.body.style.userSelect = '';
                }
            });
        }

        function initTerminal() {
            if (sshTerm) {
                sshTerm.dispose();
                sshTerm = null;
            }
            const container = document.getElementById('ssh-terminal-container');
            container.innerHTML = '';

            if (typeof Terminal === 'undefined') {
                container.innerHTML = '<p style="color:#ef4444;padding:12px;">终端组件加载失败，请刷新页面。</p>';
                return;
            }

            sshTerm = new Terminal({
                cursorBlink: true,
                fontSize: 13,
                fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace',
                convertEol: true,
            });
            sshTerm.open(container);
            sshTerm.fit();

            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(`${protocol}//${location.host}/api/v1/ssh/sessions/${sshSession.id}/terminal`);
            ws.binaryType = 'arraybuffer';
            sshTerminalWS = ws;

            ws.onopen = () => {
                sshTerm.on('data', data => {
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send(data);
                    }
                });
                window.addEventListener('resize', onTerminalResize);
                setTimeout(() => {
                    if (!sshTerm) return;
                    sshTerm.fit();
                    const dims = sshTerm.proposeGeometry();
                    if (dims && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'resize', rows: dims.rows, cols: dims.cols }));
                    }
                }, 100);
            };

            ws.onmessage = (event) => {
                if (!sshTerm) return;
                if (event.data instanceof ArrayBuffer) {
                    const data = new Uint8Array(event.data);
                    const text = new TextDecoder('utf-8', { fatal: false }).decode(data);
                    sshTerm.write(text);
                } else {
                    sshTerm.write(event.data);
                }
            };

            ws.onclose = () => {
                if (sshTerm) sshTerm.writeln('\r\n[连接已关闭]');
            };

            ws.onerror = (err) => {
                if (sshTerm) sshTerm.writeln('\r\n[终端连接错误]');
            };
        }

        function closeTerminal() {
            window.removeEventListener('resize', onTerminalResize);
            if (sshTerminalWS) {
                sshTerminalWS.close();
                sshTerminalWS = null;
            }
            if (sshTerm) {
                sshTerm.dispose();
                sshTerm = null;
            }
        }

        function onTerminalResize() {
            if (!sshTerm || !sshTerminalWS) return;
            sshTerm.fit();
            const dims = sshTerm.proposeGeometry();
            if (dims && sshTerminalWS.readyState === WebSocket.OPEN) {
                sshTerminalWS.send(JSON.stringify({ type: 'resize', rows: dims.rows, cols: dims.cols }));
            }
        }

        function showSSHPanel() {
            document.getElementById('ssh-card').classList.add('active');
        }

        function hideSSHPanel() {
            document.getElementById('ssh-card').classList.remove('active');
            resetSSHForm();
        }

        function resetSSHForm() {
            document.getElementById('ssh-connect-form').style.display = 'block';
            document.getElementById('ssh-workspace').style.display = 'none';
            document.getElementById('ssh-host').value = 'localhost';
            document.getElementById('ssh-port').value = '22';
            document.getElementById('ssh-user').value = '';
            document.getElementById('ssh-password').value = '';
            document.getElementById('ssh-private-key').value = '';
            document.getElementById('ssh-path-input').value = '/';
            setSSHStatus('');
        }

        async function connectLocalSSH() {
            setSSHStatus('正在连接本机...');
            document.getElementById('btn-ssh-local').disabled = true;
            try {
                const res = await fetch('/api/v1/ssh/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ local: true })
                });
                const body = await res.json();
                if (!res.ok || body.code !== 0) throw new Error(body.message || `HTTP ${res.status}`);
                sshSession = body.data;
                sshCurrentPath = '/';
                setSSHStatus('已连接到本机', 'connected');
                document.getElementById('ssh-connect-form').style.display = 'none';
                document.getElementById('ssh-workspace').style.display = 'flex';
                document.getElementById('ssh-session-info').textContent = 'local';
                await loadSSHFiles();
                initSplitter();
                initTerminal();
            } catch (err) {
                setSSHStatus(`连接失败：${err.message}`, 'error');
            } finally {
                document.getElementById('btn-ssh-local').disabled = false;
            }
        }

        function setSSHStatus(text, type) {
            const el = document.getElementById('ssh-status');
            el.textContent = text;
            el.className = 'ssh-status' + (type ? ' ' + type : '');
        }

        async function connectSSH() {
            const host = document.getElementById('ssh-host').value.trim();
            const port = parseInt(document.getElementById('ssh-port').value, 10) || 22;
            const user = document.getElementById('ssh-user').value.trim();
            const password = document.getElementById('ssh-password').value;
            const privateKey = document.getElementById('ssh-private-key').value.trim();

            if (!host || !user) {
                setSSHStatus('请填写主机地址和用户名', 'error');
                return;
            }
            if (!password && !privateKey) {
                setSSHStatus('请填写密码或私钥', 'error');
                return;
            }

            setSSHStatus('正在连接...');
            document.getElementById('btn-ssh-connect').disabled = true;

            try {
                const res = await fetch('/api/v1/ssh/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ host, port, user, password, private_key: privateKey })
                });
                const body = await res.json();
                if (!res.ok || body.code !== 0) throw new Error(body.message || `HTTP ${res.status}`);
                sshSession = body.data;
                sshCurrentPath = '/';
                setSSHStatus(`已连接到 ${sshSession.host}@${sshSession.user}`, 'connected');
                document.getElementById('ssh-connect-form').style.display = 'none';
                document.getElementById('ssh-workspace').style.display = 'flex';
                document.getElementById('ssh-session-info').textContent = `${sshSession.user}@${sshSession.host}`;
                await loadSSHFiles();
                initSplitter();
                initTerminal();
            } catch (err) {
                setSSHStatus(`连接失败：${err.message}`, 'error');
            } finally {
                document.getElementById('btn-ssh-connect').disabled = false;
            }
        }

        async function disconnectSSH() {
            if (!sshSession) return;
            try {
                await fetch(`/api/v1/ssh/sessions/${sshSession.id}`, { method: 'DELETE' });
            } catch (e) { }
            closeTerminal();
            sshSession = null;
            sshCurrentPath = '/';
            sshSelectedFile = null;
            document.getElementById('ssh-connect-form').style.display = 'block';
            document.getElementById('ssh-workspace').style.display = 'none';
            document.getElementById('ssh-file-list').innerHTML = '';
            document.getElementById('ssh-path-input').value = '/';
            setSSHStatus('已断开连接');
        }

        async function loadSSHFiles() {
            if (!sshSession) return;
            const listEl = document.getElementById('ssh-file-list');
            listEl.innerHTML = '<p class="placeholder">加载中...</p>';
            try {
                const data = await getJson(`/api/v1/ssh/sessions/${sshSession.id}/files?path=${encodeURIComponent(sshCurrentPath)}`);
                renderSSHFiles(data || []);
                renderSSHBreadcrumb();
            } catch (err) {
                listEl.innerHTML = `<p class="error">加载失败：${escapeHtml(err.message)}</p>`;
            }
        }

        function renderSSHBreadcrumb() {
            document.getElementById('ssh-path-input').value = sshCurrentPath;
        }

        function handleSSHPathKey(event) {
            if (event.key !== 'Enter') return;
            const input = document.getElementById('ssh-path-input');
            let path = input.value.trim();
            if (!path) path = '/';
            sshCurrentPath = path;
            sshSelectedFile = null;
            loadSSHFiles();
        }

        let _sshCurrentFiles = [];
        function renderSSHFiles(files) {
            _sshCurrentFiles = files;
            const listEl = document.getElementById('ssh-file-list');
            if (!files.length) {
                listEl.innerHTML = '<p class="placeholder">空目录</p>';
                return;
            }
            const sorted = [...files].sort((a, b) => (a.is_dir === b.is_dir ? a.name.localeCompare(b.name) : (a.is_dir ? -1 : 1)));
            listEl.innerHTML = sorted.map(f => `
                <div class="ssh-file-item ${sshSelectedFile && sshSelectedFile.path === f.path ? 'selected' : ''}"
                     onclick="sshSelectedFile = ${JSON.stringify(f).replace(/"/g, '&quot;')}; renderSSHFiles(_sshCurrentFiles);"
                     ondblclick="openSSHFile(${JSON.stringify(f).replace(/"/g, '&quot;')})"
                >
                    <span class="icon">${f.is_dir ? '📁' : '📄'}</span>
                    <span class="name">${escapeHtml(f.name)}</span>
                    <span class="size">${f.is_dir ? '-' : formatBytes(f.size)}</span>
                    <span class="actions" onclick="event.stopPropagation()">
                        ${f.is_dir ? '' : `<span onclick="downloadSSHFile('${f.path.replace(/'/g, "\\'")}')">下载</span>`}
                        <span onclick="showRenameModal('${f.path.replace(/'/g, "\\'")}', '${f.name.replace(/'/g, "\\'")}')">重命名</span>
                        <span class="danger" onclick="removeSSHFile('${f.path.replace(/'/g, "\\'")}', ${f.is_dir})">删除</span>
                    </span>
                </div>
            `).join('');
        }

        function openSSHFile(file) {
            if (file.is_dir) {
                sshCurrentPath = file.path;
                sshSelectedFile = null;
                loadSSHFiles();
            }
        }

        function sshNavigateTo(path) {
            sshCurrentPath = path;
            sshSelectedFile = null;
            loadSSHFiles();
        }

        function sshGoUp() {
            if (sshCurrentPath === '/') return;
            const idx = sshCurrentPath.lastIndexOf('/');
            sshCurrentPath = idx <= 0 ? '/' : sshCurrentPath.substring(0, idx);
            sshSelectedFile = null;
            loadSSHFiles();
        }

        async function downloadSSHFile(filePath) {
            if (!sshSession) return;
            window.open(`/api/v1/ssh/sessions/${sshSession.id}/download?path=${encodeURIComponent(filePath)}`, '_blank');
        }

        async function removeSSHFile(filePath, isDir) {
            if (!sshSession) return;
            if (!confirm(`确定要删除 ${isDir ? '目录' : '文件'} ${filePath} 吗？`)) return;
            try {
                const res = await fetch(`/api/v1/ssh/sessions/${sshSession.id}/files?path=${encodeURIComponent(filePath)}`, { method: 'DELETE' });
                const body = await res.json();
                if (!res.ok || body.code !== 0) throw new Error(body.message || `HTTP ${res.status}`);
                await loadSSHFiles();
            } catch (err) {
                alert('删除失败：' + err.message);
            }
        }

        function triggerSSHUpload() {
            document.getElementById('ssh-upload-input').click();
        }

        async function handleSSHUpload(input) {
            if (!sshSession || !input.files.length) return;
            const file = input.files[0];
            const destPath = sshCurrentPath === '/' ? '/' + file.name : sshCurrentPath + '/' + file.name;
            const formData = new FormData();
            formData.append('path', destPath);
            formData.append('file', file);
            try {
                const res = await fetch(`/api/v1/ssh/sessions/${sshSession.id}/upload`, { method: 'POST', body: formData });
                const body = await res.json();
                if (!res.ok || body.code !== 0) throw new Error(body.message || `HTTP ${res.status}`);
                await loadSSHFiles();
            } catch (err) {
                alert('上传失败：' + err.message);
            } finally {
                input.value = '';
            }
        }

        function showMkdirModal() {
            document.getElementById('ssh-modal-title').textContent = '新建目录';
            document.getElementById('ssh-modal-input').value = '';
            document.getElementById('ssh-modal-input').placeholder = '目录名称';
            sshModalCallback = async (name) => {
                if (!name) return;
                const dirPath = sshCurrentPath === '/' ? '/' + name : sshCurrentPath + '/' + name;
                try {
                    const res = await fetch(`/api/v1/ssh/sessions/${sshSession.id}/mkdir?path=${encodeURIComponent(dirPath)}`, { method: 'POST' });
                    const body = await res.json();
                    if (!res.ok || body.code !== 0) throw new Error(body.message || `HTTP ${res.status}`);
                    await loadSSHFiles();
                } catch (err) {
                    alert('创建目录失败：' + err.message);
                }
            };
            document.getElementById('ssh-modal').classList.add('active');
        }

        function showRenameModal(filePath, fileName) {
            document.getElementById('ssh-modal-title').textContent = '重命名';
            document.getElementById('ssh-modal-input').value = fileName || (sshSelectedFile ? sshSelectedFile.name : '');
            document.getElementById('ssh-modal-input').placeholder = '新名称';
            const oldPath = filePath || (sshSelectedFile ? sshSelectedFile.path : '');
            sshModalCallback = async (newName) => {
                if (!newName || !oldPath) return;
                const parent = oldPath.substring(0, oldPath.lastIndexOf('/')) || '/';
                const newPath = parent === '/' ? '/' + newName : parent + '/' + newName;
                try {
                    const res = await fetch(`/api/v1/ssh/sessions/${sshSession.id}/rename`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ old_path: oldPath, new_path: newPath })
                    });
                    const body = await res.json();
                    if (!res.ok || body.code !== 0) throw new Error(body.message || `HTTP ${res.status}`);
                    await loadSSHFiles();
                } catch (err) {
                    alert('重命名失败：' + err.message);
                }
            };
            document.getElementById('ssh-modal').classList.add('active');
        }

        function closeSSHModal() {
            document.getElementById('ssh-modal').classList.remove('active');
            sshModalCallback = null;
        }

        function confirmSSHModal() {
            const value = document.getElementById('ssh-modal-input').value.trim();
            if (sshModalCallback) sshModalCallback(value);
            closeSSHModal();
        }

    </script>
</body>
</html>
