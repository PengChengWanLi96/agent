<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 管理控制台</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 24px;
            background: #f5f7fa;
            color: #333;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
        }
        h1 {
            margin: 0 0 24px;
            font-size: 24px;
            color: #1a1a1a;
        }
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: background .2s;
        }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #93c5fd; cursor: not-allowed; }
        button.secondary { background: #e2e8f0; color: #334155; }
        button.secondary:hover { background: #cbd5e1; }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
            padding: 20px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .card h2 {
            margin: 0 0 16px;
            font-size: 18px;
            color: #444;
        }
        .form-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .form-row label { font-size: 14px; color: #475569; font-weight: 500; }
        .form-row input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }
        .drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 32px 24px;
            text-align: center;
            color: #64748b;
            position: relative;
            transition: border-color .2s, background .2s;
            cursor: pointer;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #2563eb;
            background: #eff6ff;
            color: #2563eb;
        }
        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .drop-zone-prompt svg { margin-bottom: 8px; color: #94a3b8; }
        .drop-zone:hover .drop-zone-prompt svg,
        .drop-zone.dragover .drop-zone-prompt svg { color: #2563eb; }
        .drop-zone-prompt p { margin: 4px 0; font-size: 14px; }
        .drop-zone-prompt .link { color: #2563eb; text-decoration: underline; }
        .drop-zone-prompt .hint { font-size: 12px; color: #94a3b8; }
        .file-list {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #f8fafc;
            border-radius: 6px;
            font-size: 13px;
        }
        .file-item .name { color: #334155; word-break: break-all; }
        .file-item .size { color: #64748b; white-space: nowrap; margin-left: 12px; }
        .file-item .remove {
            margin-left: 12px;
            color: #ef4444;
            cursor: pointer;
            font-size: 12px;
        }
        .upload-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .upload-result {
            margin-top: 16px;
            font-size: 13px;
        }
        .upload-result .success { color: #16a34a; }
        .upload-result .fail { color: #ef4444; }
        .progress-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: #2563eb;
            transition: width .2s;
        }
        pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 6px;
            overflow: auto;
            font-size: 13px;
            line-height: 1.5;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .error { color: #ef4444; }
        .placeholder { color: #94a3b8; }
        .table-wrap {
            overflow-x: auto;
            background: #fff;
            border-radius: 6px;
        }
        table {
            width: 100%;
            min-width: 900px;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: top;
        }
        th {
            background: #f8fafc;
            color: #64748b;
            font-weight: 600;
            white-space: nowrap;
        }
        td {
            color: #334155;
            word-break: break-word;
        }
        td.nowrap { white-space: nowrap; }
        td.id { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .status-running { color: #16a34a; font-weight: 500; }
        .status-exited { color: #dc2626; }
        .status-paused { color: #ca8a04; }
        .status-restarting { color: #2563eb; }
        h3 { margin: 16px 0 10px; font-size: 15px; color: #444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Agent 管理控制台</h1>
        <div class="toolbar">
            <button id="btn-version" onclick="loadVersion()">查看版本信息</button>
            <button id="btn-metrics" onclick="loadMetrics()">查看服务器监控指标</button>
            <button id="btn-containers" onclick="loadContainers()">容器列表</button>
            <button id="btn-images" onclick="loadImages()">镜像列表</button>
            <button id="btn-upload" onclick="showUploadPanel()">文件上传</button>
        </div>

        <div class="card upload-card" id="upload-card" style="display:none;">
            <h2>文件上传</h2>
            <div class="form-row">
                <label for="upload-dest">目标目录</label>
                <input type="text" id="upload-dest" placeholder="例如 /tmp/uploads 或 ./uploads" value="./uploads">
            </div>
            <div class="drop-zone" id="drop-zone">
                <div class="drop-zone-prompt">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <p>拖拽文件到此处，或 <span class="link">点击选择文件</span></p>
                    <p class="hint">支持多文件上传</p>
                </div>
                <input type="file" id="file-input" multiple>
            </div>
            <div class="file-list" id="file-list"></div>
            <div class="upload-actions">
                <button id="btn-submit-upload" onclick="submitUpload()" disabled>开始上传</button>
                <button class="secondary" onclick="clearUpload()">清空</button>
            </div>
            <div class="upload-result" id="upload-result"></div>
        </div>

        <div class="card">
            <h2>结果</h2>
            <div id="result">
                <p class="placeholder">点击上方按钮查看对应信息。</p>
            </div>
        </div>
    </div>

    <script>
        const resultEl = document.getElementById('result');

        function setLoading(text) {
            resultEl.innerHTML = `<p class="placeholder">${text}</p>`;
        }

        function showError(err) {
            resultEl.innerHTML = `<p class="error">请求失败：${escapeHtml(err)}</p>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function getJson(url) {
            const res = await fetch(url);
            const body = await res.json();
            if (!res.ok || body.code !== 0) {
                throw new Error(body.message || `HTTP ${res.status}`);
            }
            return body.data;
        }

        function renderTable(rows, options = {}) {
            if (!rows.length) return '<p class="placeholder">无数据</p>';
            const headers = Object.keys(rows[0]);
            const headerClasses = options.headerClasses || {};
            const cellClasses = options.cellClasses || {};
            let html = '<div class="table-wrap"><table><tr>';
            html += headers.map(h => `<th class="${headerClasses[h] || ''}">${escapeHtml(h)}</th>`).join('');
            html += '</tr>';
            for (const row of rows) {
                html += '<tr>' + headers.map(h => {
                    const cls = cellClasses[h] || '';
                    return `<td class="${cls}">${escapeHtml(String(row[h] ?? ''))}</td>`;
                }).join('') + '</tr>';
            }
            html += '</table></div>';
            return html;
        }

        async function loadVersion() {
            setLoading('正在加载版本信息...');
            try {
                const data = await getJson('/api/v1/version');
                resultEl.innerHTML = `<pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
            } catch (err) {
                showError(err.message);
            }
        }

        async function loadMetrics() {
            setLoading('正在加载监控指标...');
            try {
                const data = await getJson('/api/v1/metrics/collect');
                let html = '';

                html += '<h3>CPU</h3>' + renderTable([data.cpu || {}]);
                html += '<h3>Memory</h3>' + renderTable([data.memory || {}]);
                html += '<h3>Load</h3>' + renderTable([data.load || {}]);
                html += '<h3>Disk</h3>' + renderTable(data.disk || []);
                html += '<h3>Network</h3>' + renderTable(data.network || []);
                html += `<p><strong>Uptime:</strong> ${escapeHtml(data.uptime_formatted ?? '-')} (${(data.uptime_seconds ?? 0).toFixed(3)} seconds)</p>`;

                resultEl.innerHTML = html;
            } catch (err) {
                showError(err.message);
            }
        }

        function formatBytes(bytes) {
            if (bytes == null || bytes === 0) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            const k = 1024;
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + units[i];
        }

        function formatContainerNames(names) {
            if (!Array.isArray(names) || !names.length) return '-';
            return names.map(n => n.replace(/^\//, '')).join(', ');
        }

        function formatPorts(ports) {
            if (!Array.isArray(ports) || !ports.length) return '-';
            return ports.map(p => {
                if (p.public_port) {
                    return `${p.ip || '0.0.0.0'}:${p.public_port} -> ${p.private_port}/${p.type}`;
                }
                return `${p.private_port}/${p.type}`;
            }).join(', ');
        }

        async function loadContainers() {
            setLoading('正在加载容器列表...');
            try {
                const data = await getJson('/api/v1/docker/containers?all=true');
                const rows = (data || []).map(c => ({
                    ID: c.id ? c.id.substring(0, 12) : '-',
                    Names: formatContainerNames(c.names),
                    Image: c.image || '-',
                    State: c.state || '-',
                    Status: c.status || '-',
                    Ports: formatPorts(c.ports),
                    Created: c.created ? new Date(c.created * 1000).toLocaleString() : '-'
                }));
                const cellClasses = {
                    ID: 'id nowrap',
                    State: 'nowrap',
                    Status: 'nowrap',
                    Created: 'nowrap'
                };
                resultEl.innerHTML = `<h3>容器列表（共 ${rows.length} 个）</h3>` + renderTable(rows, { cellClasses });
            } catch (err) {
                showError(err.message);
            }
        }

        async function loadImages() {
            setLoading('正在加载镜像列表...');
            try {
                const data = await getJson('/api/v1/docker/images');
                const rows = (data || []).map(img => ({
                    ID: img.id ? img.id.substring(0, 12) : '-',
                    Repository: (img.repo_tags && img.repo_tags.length) ? img.repo_tags.join(', ') : '<none>',
                    Size: formatBytes(img.size),
                    'Virtual Size': formatBytes(img.virtual_size),
                    Created: img.created ? new Date(img.created * 1000).toLocaleString() : '-'
                }));
                resultEl.innerHTML = `<h3>镜像列表（共 ${rows.length} 个）</h3>` + renderTable(rows);
            } catch (err) {
                showError(err.message);
            }
        }

        let pendingFiles = [];

        function showUploadPanel() {
            document.getElementById('upload-card').style.display = 'block';
            document.getElementById('upload-card').scrollIntoView({ behavior: 'smooth' });
        }

        function updateFileList() {
            const listEl = document.getElementById('file-list');
            if (!pendingFiles.length) {
                listEl.innerHTML = '';
                document.getElementById('btn-submit-upload').disabled = true;
                return;
            }
            listEl.innerHTML = pendingFiles.map((file, idx) => `
                <div class="file-item">
                    <span class="name">${escapeHtml(file.name)}</span>
                    <span>
                        <span class="size">${formatBytes(file.size)}</span>
                        <span class="remove" onclick="removeFile(${idx})">移除</span>
                    </span>
                </div>
            `).join('');
            document.getElementById('btn-submit-upload').disabled = false;
        }

        function removeFile(idx) {
            pendingFiles.splice(idx, 1);
            updateFileList();
        }

        function clearUpload() {
            pendingFiles = [];
            updateFileList();
            document.getElementById('upload-result').innerHTML = '';
            document.getElementById('file-input').value = '';
        }

        function handleFiles(files) {
            for (const file of files) {
                pendingFiles.push(file);
            }
            updateFileList();
        }

        async function submitUpload() {
            const destDir = document.getElementById('upload-dest').value.trim();
            if (!destDir) {
                alert('请填写目标目录');
                return;
            }
            if (!pendingFiles.length) {
                alert('请先选择文件');
                return;
            }

            const resultEl = document.getElementById('upload-result');
            resultEl.innerHTML = '<p class="placeholder">正在上传...</p>';
            document.getElementById('btn-submit-upload').disabled = true;

            const formData = new FormData();
            formData.append('dest_dir', destDir);
            for (const file of pendingFiles) {
                formData.append('files', file);
            }

            try {
                const res = await fetch('/api/v1/upload/files', { method: 'POST', body: formData });
                const body = await res.json();
                if (!res.ok || body.code !== 0) {
                    throw new Error(body.message || `HTTP ${res.status}`);
                }
                const results = body.data || [];
                const successCount = results.filter(r => r.success).length;
                const failCount = results.length - successCount;

                let html = `<p><strong>上传完成：</strong>成功 ${successCount} 个，失败 ${failCount} 个</p>`;
                html += '<ul>' + results.map(r => {
                    const cls = r.success ? 'success' : 'fail';
                    const msg = r.success ? formatBytes(r.size) : r.error;
                    return `<li class="${cls}">${escapeHtml(r.name)}：${escapeHtml(String(msg))}</li>`;
                }).join('') + '</ul>';
                resultEl.innerHTML = html;

                if (successCount === results.length) {
                    pendingFiles = [];
                    updateFileList();
                }
            } catch (err) {
                resultEl.innerHTML = `<p class="error">上传失败：${escapeHtml(err.message)}</p>`;
            } finally {
                document.getElementById('btn-submit-upload').disabled = pendingFiles.length === 0;
            }
        }

        (function initUpload() {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
            });
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
            });
            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
            });
            dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files), false);
            fileInput.addEventListener('change', e => handleFiles(e.target.files), false);
        })();
    </script>
</body>
</html>
