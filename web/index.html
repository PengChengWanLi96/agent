<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 管理控制台</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 24px;
            background: #f5f7fa;
            color: #333;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
        }
        h1 {
            margin: 0 0 24px;
            font-size: 24px;
            color: #1a1a1a;
        }
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: background .2s;
        }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #93c5fd; cursor: not-allowed; }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h2 {
            margin: 0 0 16px;
            font-size: 18px;
            color: #444;
        }
        pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 6px;
            overflow: auto;
            font-size: 13px;
            line-height: 1.5;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .error { color: #ef4444; }
        .placeholder { color: #94a3b8; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            text-align: left;
            padding: 8px 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        th { background: #f8fafc; color: #64748b; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Agent 管理控制台</h1>
        <div class="toolbar">
            <button id="btn-version" onclick="loadVersion()">查看版本信息</button>
            <button id="btn-metrics" onclick="loadMetrics()">查看服务器监控指标</button>
            <button id="btn-containers" onclick="loadContainers()">容器列表</button>
            <button id="btn-images" onclick="loadImages()">镜像列表</button>
        </div>

        <div class="card">
            <h2>结果</h2>
            <div id="result">
                <p class="placeholder">点击上方按钮查看对应信息。</p>
            </div>
        </div>
    </div>

    <script>
        const resultEl = document.getElementById('result');

        function setLoading(text) {
            resultEl.innerHTML = `<p class="placeholder">${text}</p>`;
        }

        function showError(err) {
            resultEl.innerHTML = `<p class="error">请求失败：${escapeHtml(err)}</p>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function getJson(url) {
            const res = await fetch(url);
            const body = await res.json();
            if (!res.ok || body.code !== 0) {
                throw new Error(body.message || `HTTP ${res.status}`);
            }
            return body.data;
        }

        function renderTable(rows) {
            if (!rows.length) return '<p class="placeholder">无数据</p>';
            const headers = Object.keys(rows[0]);
            let html = '<table><tr>' + headers.map(h => `<th>${escapeHtml(h)}</th>`).join('') + '</tr>';
            for (const row of rows) {
                html += '<tr>' + headers.map(h => `<td>${escapeHtml(String(row[h] ?? ''))}</td>`).join('') + '</tr>';
            }
            html += '</table>';
            return html;
        }

        async function loadVersion() {
            setLoading('正在加载版本信息...');
            try {
                const data = await getJson('/api/v1/version');
                resultEl.innerHTML = `<pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
            } catch (err) {
                showError(err.message);
            }
        }

        async function loadMetrics() {
            setLoading('正在加载监控指标...');
            try {
                const data = await getJson('/api/v1/metrics/collect');
                let html = '';

                html += '<h3>CPU</h3>' + renderTable([data.cpu || {}]);
                html += '<h3>Memory</h3>' + renderTable([data.memory || {}]);
                html += '<h3>Load</h3>' + renderTable([data.load || {}]);
                html += '<h3>Disk</h3>' + renderTable(data.disk || []);
                html += '<h3>Network</h3>' + renderTable(data.network || []);
                html += `<p><strong>Uptime:</strong> ${data.uptime_seconds ?? '-'} seconds</p>`;

                resultEl.innerHTML = html;
            } catch (err) {
                showError(err.message);
            }
        }

        function formatBytes(bytes) {
            if (bytes == null || bytes === 0) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            const k = 1024;
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + units[i];
        }

        function formatContainerNames(names) {
            if (!Array.isArray(names) || !names.length) return '-';
            return names.map(n => n.replace(/^\//, '')).join(', ');
        }

        function formatPorts(ports) {
            if (!Array.isArray(ports) || !ports.length) return '-';
            return ports.map(p => {
                if (p.public_port) {
                    return `${p.ip || '0.0.0.0'}:${p.public_port} -> ${p.private_port}/${p.type}`;
                }
                return `${p.private_port}/${p.type}`;
            }).join(', ');
        }

        async function loadContainers() {
            setLoading('正在加载容器列表...');
            try {
                const data = await getJson('/api/v1/docker/containers?all=true');
                const rows = (data || []).map(c => ({
                    ID: c.id ? c.id.substring(0, 12) : '-',
                    Names: formatContainerNames(c.names),
                    Image: c.image || '-',
                    State: c.state || '-',
                    Status: c.status || '-',
                    Ports: formatPorts(c.ports),
                    Created: c.created ? new Date(c.created * 1000).toLocaleString() : '-'
                }));
                resultEl.innerHTML = `<h3>容器列表（共 ${rows.length} 个）</h3>` + renderTable(rows);
            } catch (err) {
                showError(err.message);
            }
        }

        async function loadImages() {
            setLoading('正在加载镜像列表...');
            try {
                const data = await getJson('/api/v1/docker/images');
                const rows = (data || []).map(img => ({
                    ID: img.id ? img.id.substring(0, 12) : '-',
                    Repository: (img.repo_tags && img.repo_tags.length) ? img.repo_tags.join(', ') : '<none>',
                    Size: formatBytes(img.size),
                    'Virtual Size': formatBytes(img.virtual_size),
                    Created: img.created ? new Date(img.created * 1000).toLocaleString() : '-'
                }));
                resultEl.innerHTML = `<h3>镜像列表（共 ${rows.length} 个）</h3>` + renderTable(rows);
            } catch (err) {
                showError(err.message);
            }
        }
    </script>
</body>
</html>
